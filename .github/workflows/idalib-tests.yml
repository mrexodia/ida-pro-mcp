name: idalib-tests
on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
  workflow_dispatch:

jobs:
  idalib-tests:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'pull_request_target' && 'external-pr' || '' }}
    # Skip pull_request from forks (those go through pull_request_target instead)
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: write
      packages: read
      pull-requests: write
    container:
      image: ghcr.io/mrexodia/ida-docker/ida:9.1
      credentials:
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: true

      - uses: astral-sh/setup-uv@v7

      - name: Run tests
        run: |
          uv run ida-mcp-test tests/crackme03.elf -q
          uv run ida-mcp-test tests/typed_fixture.elf -q
